<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background gradient: blue → green -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd"/>
      <stop offset="50%" style="stop-color:#198754"/>
      <stop offset="100%" style="stop-color:#0f5132"/>
    </linearGradient>
    <!-- Leaf gradient: white → light green -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <!-- Ring gradient: teal → blue -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Outer circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  <!-- Subtle glow rings -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Leaf shape (pointed top, rounded sides) -->
  <path d="M50 16 C30 28, 20 46, 28 64 C33 76, 42 84, 50 84 C58 84, 67 76, 72 64 C80 46, 70 28, 50 16Z"
        fill="url(#leafGrad)" opacity="0.95"/>

  <!-- Center leaf vein -->
  <line x1="50" y1="22" x2="50" y2="78" stroke="#198754" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Benzene / Hexagonal molecular ring (center of leaf) -->
  <!-- Hexagon points (radius 16, center 50,50) -->
  <!-- Top: 50,34  TopRight: 63.9,42  BottomRight: 63.9,58  Bottom: 50,66  BottomLeft: 36.1,58  TopLeft: 36.1,42 -->
  <polygon points="50,33 63,41 63,57 50,65 37,57 37,41"
           fill="none" stroke="url(#ringGrad)" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Alternating double bonds (benzene style) -->
  <line x1="50" y1="33" x2="63" y2="41" stroke="#6610f2" stroke-width="2.2"/>
  <line x1="63" y1="57" x2="50" y2="65" stroke="#6610f2" stroke-width="2.2"/>
  <line x1="37" y1="41" x2="37" y2="57" stroke="#6610f2" stroke-width="2.2"/>

  <!-- Atoms at hexagon vertices (colored dots) -->
  <circle cx="50" cy="33" r="3" fill="#0d6efd"/>
  <circle cx="63" cy="41" r="3" fill="#20c997"/>
  <circle cx="63" cy="57" r="3" fill="#198754"/>
  <circle cx="50" cy="65" r="3" fill="#0891b2"/>
  <circle cx="37" cy="57" r="3" fill="#6610f2"/>
  <circle cx="37" cy="41" r="3" fill="#fd7e14"/>

  <!-- Center dot -->
  <circle cx="50" cy="49" r="2.5" fill="rgba(255,255,255,0.8)"/>
</svg>
