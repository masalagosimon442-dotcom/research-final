<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#0f5132"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  <!-- Subtle inner ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Leaf shape -->
  <path d="M50 20 C32 32, 24 50, 32 66 C37 76, 44 80, 50 80 C56 80, 63 76, 68 66 C76 50, 68 32, 50 20Z" 
        fill="url(#leafGrad)" opacity="0.95"/>
  <!-- Center vein -->
  <path d="M50 26 Q50 50 50 74" stroke="#198754" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Side veins -->
  <path d="M50 38 Q42 42 36 48" stroke="#198754" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M50 38 Q58 42 64 48" stroke="#198754" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M50 50 Q43 54 37 60" stroke="#198754" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M50 50 Q57 54 63 60" stroke="#198754" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M50 62 Q45 65 40 70" stroke="#198754" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M50 62 Q55 65 60 70" stroke="#198754" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
