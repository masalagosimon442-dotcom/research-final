<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd"/>
      <stop offset="50%" style="stop-color:#198754"/>
      <stop offset="100%" style="stop-color:#0f5132"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <linearGradient id="veinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd"/>
      <stop offset="100%" style="stop-color:#198754"/>
    </linearGradient>
  </defs>
  <!-- Circle background with mixed gradient -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Inner subtle ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <!-- Leaf shape -->
  <path d="M50 18 C30 30, 22 50, 32 68 C37 78, 44 82, 50 82 C56 82, 63 78, 68 68 C78 50, 70 30, 50 18Z" 
        fill="url(#leafGrad)" opacity="0.95"/>
  <!-- Center vein with gradient -->
  <path d="M50 24 Q50 50 50 76" stroke="url(#veinGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Side veins (blue to green) -->
  <path d="M50 36 Q41 40 34 47" stroke="#0d6efd" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M50 36 Q59 40 66 47" stroke="#198754" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M50 48 Q42 52 35 58" stroke="#6610f2" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M50 48 Q58 52 65 58" stroke="#20c997" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M50 60 Q44 63 38 68" stroke="#198754" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M50 60 Q56 63 62 68" stroke="#0d6efd" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Small decorative dots -->
  <circle cx="34" cy="47" r="2" fill="#0d6efd" opacity="0.6"/>
  <circle cx="66" cy="47" r="2" fill="#198754" opacity="0.6"/>
  <circle cx="35" cy="58" r="1.5" fill="#6610f2" opacity="0.5"/>
  <circle cx="65" cy="58" r="1.5" fill="#20c997" opacity="0.5"/>
</svg>
