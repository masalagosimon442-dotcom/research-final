services:
  - type: web
    name: hazina-asili
    runtime: docker
    repo: https://github.com/masalagosimon442-dotcom/research-final
    branch: master
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: HAZINA ASILI
      - key: APP_VERSION
        value: "4.0.0"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://hazina-asili.onrender.com/
      - key: DB_DRIVER
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: hazina-asili-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hazina-asili-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: hazina-asili-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: hazina-asili-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: hazina-asili-db
          property: database
      - key: DB_SSL
        value: "true"
      - key: SESSION_LIFETIME
        value: "3600"
      - key: RECORDS_PER_PAGE
        value: "15"
      - key: LOGIN_MAX_ATTEMPTS
        value: "5"
      - key: LOGIN_LOCKOUT_MINUTES
        value: "15"
      - key: FORCE_HTTPS
        value: "true"
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: UPLOAD_DIR
        value: assets/uploads/

databases:
  - name: hazina-asili-db
    databaseName: natural_compounds_db
    user: hazina_asili
    plan: free
    ipAllowList: []
